<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bounce Effect</title>
    <style>
        .container{
            height: 70vh;
            width:60vw;
            background-color:blueviolet;
            position: relative;
        }
        .box{
            background-color: blanchedalmond;
            height: 40px;
            width: 50px;
            border-radius: 75%;
            text-align: center;
            padding:20px;
            position:absolute;
            bottom: 0;
            left:0;
            animation: animate1 3s linear infinite ,animate2 2s ease-out alternate infinite;
        }

        @keyframes animate1{
            from{
                left:0%;
            }
            to{
                left:100%;
            }
        }
        @keyframes animate2{
            from{
                bottom: 0%;
            }
            to{
                bottom: 100%;
            }
        } 
        
    </style>
</head>
<body>
    <div class="container">
        box1
        <div class="box">box2</div>
    </div>
</body>
</html>
