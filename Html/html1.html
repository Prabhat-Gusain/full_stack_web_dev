<!-- Tables in html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Tables in HTML</title>
    <style>
        table, th, td{
            border:1px solid black;
            /* border-collapse:collapse; */
            border-radius:8px;
            border-style:groove;
            border-color: chocolate;
        }
        th{
            background-color:blueviolet;
        }
        td{
            background-color: antiquewhite;
        }
    </style>
</head>
<body>
    <table >
        <tr>
            <th>Company</th>
            <th>Contact</th>
            <th>Country</th>
        </tr>
        <tr>
            <td>Alfreds Futtterkiste</td>
            <td>Maria Andres</td>
            <td>Germany</td>
        </tr>
        <tr>
            <td>Centro comercial moctezuma</td>
            <td>Francisco Chang</td>
            <td>Mexico</td>
        </tr>
    </table>
</body>
</html>
